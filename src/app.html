<!doctype html>
<html lang="en" class="">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#FFFBF4" />

  <!-- SEO -->
  <title>ShopHub — Premium Shopping in Nigeria</title>
  <meta name="description" content="Shop premium electronics, fashion, and lifestyle products. Fast delivery across Lagos, Abuja & Port Harcourt." />
  <link rel="canonical" href="https://shophub.ng" />

  <!-- OpenGraph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="ShopHub — Premium Shopping in Nigeria" />
  <meta property="og:description" content="Shop premium electronics, fashion, and lifestyle products. Fast delivery across Nigeria." />
  <meta property="og:url" content="https://shophub.ng" />
  <meta property="og:image" content="/og-image.jpg" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ShopHub" />
  <meta name="twitter:description" content="Premium shopping in Nigeria." />
  <meta name="twitter:image" content="/og-image.jpg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />

  <!-- Favicons -->
  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover" class="bg-bg text-primary antialiased">
  <div id="svelte">%sveltekit.body%</div>
</body>
</html>
